# HotpotQA 외부검증 — 그래프 계열. 내부 gemini_extract.yaml과 동일 조건,
# storage_dir/data_dir/extract_lang 3개만 도메인 적응(불가피).
llm:
  provider: google
  model: gemini-2.5-flash
  temperature: 0.1
  max_tokens: 4096
  thinking: false
embed:
  provider: local
  model: intfloat/multilingual-e5-small
chunk_size: 1024
chunk_overlap: 64
top_k: 4
data_dir: data/hotpot
storage_dir: storage_hotpot
extract_lang: en
