# 완전 로컬 그래프 추출 설정 — M2(Apple Silicon)의 Ollama+Gemma 사용.
# 추출/생성 = 로컬 Ollama(무료·rate limit 없음), 임베딩 = 로컬 e5-small.
# 실행 위치:
#   (A) M2에서 직접:  ollama serve(기본 실행) → 그대로 사용(localhost)
#   (B) 다른 머신에서 M2를 가리킬 때:  M2에서 `OLLAMA_HOST=0.0.0.0 ollama serve`,
#       실행 머신에서  export OLLAMA_BASE_URL=http://<M2-IP>:11434
llm:
  provider: ollama
  model: gemma4:e2b       # 산문 추출용(빠름)
  temperature: 0.1
  max_tokens: 4096
  num_ctx: 8192           # 입력 컨텍스트(기본 4096 → 8192로 확장, global breadth)

embed:
  provider: local
  model: intfloat/multilingual-e5-small

chunk_size: 1024     # 2048→1024: 핀포인트 검색 granularity↑ + 추출 truncation 정합
chunk_overlap: 64
top_k: 4
data_dir: data/company
storage_dir: storage
