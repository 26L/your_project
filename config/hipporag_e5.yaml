# HippoRAG2 공정비교 — 임베딩을 다른 기법과 동일한 e5(OpenAI호환 서버)로 통일.
# PPR만 변수가 되도록. 서버 먼저: python scripts/e5_openai_server.py --port 8123
llm:
  provider: google
  model: gemini-2.5-flash
  temperature: 0.1
  max_tokens: 4096
  thinking: false
embed:
  provider: local
  model: intfloat/multilingual-e5-small
chunk_size: 1024
chunk_overlap: 64
top_k: 4
data_dir: data/company
storage_dir: storage
hipporag_embedding: text-embedding-e5
hipporag_embedding_base_url: http://127.0.0.1:8123/v1
